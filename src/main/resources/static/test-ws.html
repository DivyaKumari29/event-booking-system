<!DOCTYPE html>
<html>
<head>
    <title>Seat Update WebSocket Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body style="font-family: monospace; padding: 20px;">
<h2>Real-Time Seat Updates — Event ID: <span id="eventIdLabel">2</span></h2>
<p>Status: <span id="status">Connecting...</span></p>
<div id="log" style="border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll; background: #f5f5f5;"></div>

<script>
    const eventId = 2; // change this to match your test event's ID

    const socket = new SockJS('http://localhost:8080/ws');
    const stompClient = Stomp.over(socket);

    stompClient.connect({}, function (frame) {
        document.getElementById('status').innerText = 'Connected';
        document.getElementById('log').innerHTML += '<div>✅ Connected: ' + frame + '</div>';

        stompClient.subscribe('/topic/seats/' + eventId, function (message) {
            const data = JSON.parse(message.body);
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += '<div>🔔 Seat ' + data.seatNumber + ' (id: ' + data.seatId + ') is now <b>' + data.status + '</b></div>';
            logDiv.scrollTop = logDiv.scrollHeight;
        });
    }, function (error) {
        document.getElementById('status').innerText = 'Connection failed';
        document.getElementById('log').innerHTML += '<div>❌ Error: ' + error + '</div>';
    });
</script>
</body>
</html>
