spring.application.name=event-booking-system

# Database - reads from environment variables in production, falls back to local defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventbooking}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:booking_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:booking_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=${PORT:8080}

# JWT
app.jwt.secret=${JWT_SECRET:ThisIsATemporarySecretKeyForDevelopmentOnlyChangeInProduction123456}
app.jwt.expiration-ms=86400000

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:gQAAAAAAAsutAAIgcDFlNGU0MWU4NDY0MWE0ZGEzOGFkM2JkOTdlMDE4ODk1OQ}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}